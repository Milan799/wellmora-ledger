<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Squircle Gradient -->
    <linearGradient id="wm-bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="50%" stop-color="#4338ca" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Main 'W' Ribbon & Growth Chart Gradient -->
    <linearGradient id="wm-brand-grad" x1="80" y1="360" x2="420" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="45%" stop-color="#3b82f6" />
      <stop offset="85%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Emerald Arrow Accent -->
    <linearGradient id="wm-emerald-grad" x1="300" y1="200" x2="440" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="wm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background squircle for app icon / favicon -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#wm-bg-grad)" />
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#818cf8" stroke-width="6" stroke-opacity="0.35" />

  <!-- Main Dynamic Ledger Growth 'W' Path -->
  <path 
    d="M 104 220 L 172 350 L 256 260 L 338 350 L 416 156" 
    stroke="url(#wm-brand-grad)" 
    stroke-width="36" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#wm-glow)"
  />

  <!-- Arrowhead at top right growth peak -->
  <path 
    d="M 350 156 H 416 V 222" 
    stroke="url(#wm-emerald-grad)" 
    stroke-width="36" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Glowing Ledger Data Nodes -->
  <circle cx="172" cy="350" r="14" fill="#06b6d4" />
  <circle cx="256" cy="260" r="14" fill="#3b82f6" />
  <circle cx="338" cy="350" r="14" fill="#10b981" />
  <circle cx="416" cy="156" r="16" fill="#34d399" />
</svg>