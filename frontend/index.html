<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <title>Wellmora Ledger - Business Expense & Ledger Tracking</title>
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Register SW with updateViaCache: 'none' to bypass browser HTTP cache for sw.js
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(reg => {
            console.log('PWA Service Worker registered successfully.');
            
            // Check for service worker updates immediately
            reg.update();

            // Check for updates when user returns to tab
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') {
                reg.update();
              }
            });
          })
          .catch(err => console.error('PWA Service Worker registration failed:', err));
      });

      // Reload the page when the new service worker activates and claims the client
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
</body>

</html>
